name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            build_cmd: npm run pack:mac-universal -- -p never
            artifact_pattern: |
              dist-electron/*.dmg
              dist-electron/*.zip
              dist-electron/*.yml
              dist-electron/*.blockmap
          - os: windows-latest
            platform: win
            build_cmd: npm run pack:win-x64 -- -p never
            artifact_pattern: |
              dist-electron/*.exe
              dist-electron/*.yml
              dist-electron/*.blockmap

    runs-on: ${{ matrix.os }}

    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # ── macOS: 下载 ffmpeg 到 vendor/darwin/ffmpeg ──
      - name: Download ffmpeg (macOS)
        if: matrix.platform == 'mac'
        run: |
          mkdir -p vendor/darwin/ffmpeg/bin
          brew install ffmpeg
          cp $(which ffmpeg) vendor/darwin/ffmpeg/bin/ffmpeg
          cp $(which ffprobe) vendor/darwin/ffmpeg/bin/ffprobe
          chmod +x vendor/darwin/ffmpeg/bin/*

      # ── Windows: 下载 ffmpeg 到 vendor/windows/ffmpeg ──
      - name: Download ffmpeg (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $zipFile = "$env:TEMP\ffmpeg.zip"
          $extractDir = "$env:TEMP\ffmpeg-extract"
          Write-Host "Downloading ffmpeg..."
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $zipFile -UseBasicParsing
          Write-Host "Extracting ffmpeg..."
          Expand-Archive -Path $zipFile -DestinationPath $extractDir -Force
          $ffmpegDir = Get-ChildItem -Path $extractDir -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path "vendor\windows\ffmpeg\bin"
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" "vendor\windows\ffmpeg\bin\"
          Copy-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" "vendor\windows\ffmpeg\bin\"
          Copy-Item "$($ffmpegDir.FullName)\bin\ffplay.exe" "vendor\windows\ffmpeg\bin\"
          Copy-Item "$($ffmpegDir.FullName)\LICENSE" "vendor\windows\ffmpeg\" -ErrorAction SilentlyContinue
          Copy-Item "$($ffmpegDir.FullName)\README.txt" "vendor\windows\ffmpeg\" -ErrorAction SilentlyContinue
          Write-Host "ffmpeg files:"
          Get-ChildItem "vendor\windows\ffmpeg\bin"

      - name: Build App
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.exe
            dist-electron/*.yml
            dist-electron/*.blockmap

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: ${{ matrix.artifact_pattern }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
